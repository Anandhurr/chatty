<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CHATTY · Anonymous Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .glass-panel {
            max-width: 550px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .screen {
            padding: 1.2rem;
        }

        #chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px dashed rgba(255, 160, 70, 0.4);
        }

        h2 {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ffffff, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #ff9f4a;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #ffbc7a;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 1);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.end {
            background: rgba(220, 60, 50, 0.2);
            border-color: #ff6b6b;
            color: #ffaaaa;
        }

        .action-btn.end:hover {
            background: rgba(220, 60, 50, 0.35);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        #status {
            background: #0f1625cc;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #ffbc7a;
            flex: 1;
        }

        .online-counter {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #ffd966;
            white-space: nowrap;
        }

        #messages {
            list-style: none;
            height: 55vh;
            max-height: 450px;
            overflow-y: auto;
            padding: 0.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
            animation: fadeSlide 0.2s ease;
        }

        .msg-you {
            align-self: flex-end;
            background: linear-gradient(120deg, #ff8c2e, #ffaa55);
            color: #0f0f1c;
            border-bottom-right-radius: 4px;
        }

        .msg-stranger {
            align-self: flex-start;
            background: #1f2a44;
            border: 1px solid #3a4570;
            color: #f0f3ff;
            border-bottom-left-radius: 4px;
        }

        .msg-system {
            align-self: center;
            background: #1a1f2e80;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 30px;
            color: #bbccff;
            text-align: center;
            max-width: 90%;
        }

        .msg-warning {
            align-self: center;
            background: rgba(255, 100, 50, 0.25);
            border: 1px solid #ff8866;
            color: #ffaa88;
            font-size: 0.8rem;
            padding: 10px 18px;
            border-radius: 30px;
            text-align: center;
            font-weight: 600;
            animation: shake 0.5s ease;
        }

        .msg-error {
            align-self: center;
            background: rgba(220, 60, 50, 0.3);
            border: 1px solid #ff5555;
            color: #ffaaaa;
            font-size: 0.8rem;
            padding: 10px 18px;
            border-radius: 30px;
            text-align: center;
        }

        .msg-success {
            align-self: center;
            background: rgba(50, 200, 100, 0.2);
            border: 1px solid #66ff88;
            color: #aaffcc;
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 30px;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #form {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding-top: 10px;
            border-top: 1px solid #2a2f44;
        }

        #input {
            flex: 1;
            background: #0e1424;
            border: 1px solid #3f4a6b;
            padding: 12px 16px;
            border-radius: 60px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }

        #input:focus {
            border-color: #ff9f4a;
        }

        #input:disabled {
            opacity: 0.5;
        }

        .send-btn {
            background: #ff8c2e;
            border: none;
            padding: 0 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #0c0f1c;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #ffa34d;
            transform: scale(1.02);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #101624;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff9f4a;
            border-radius: 10px;
        }

        .footer-note {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 0.8rem;
            color: #5f6c92;
        }

        .refresh-indicator {
            text-align: center;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #ffaa55;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 480px) {
            .screen {
                padding: 1rem;
            }
            .action-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            h2 {
                font-size: 1.1rem;
            }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="glass-panel">
    <div class="screen">
        <div id="chat-header">
            <h2>💬 CHATTY</h2>
            <div class="header-buttons">
                <button id="skipBtn" class="action-btn">⏭ Skip</button>
                <button id="endBtn" class="action-btn end">✖ End</button>
            </div>
        </div>
        
        <div class="status-bar">
            <span id="status">🔍 connecting...</span>
            <span id="userCounter" class="online-counter">👥 0 online</span>
        </div>
        
        <ul id="messages"></ul>
        
        <form id="form">
            <input id="input" placeholder="Type message..." autocomplete="off" />
            <button type="submit" class="send-btn">➤ Send</button>
        </form>
        
        <div class="footer-note">
            🤝 Click SKIP → page refreshes to find new partner<br>
            ✖ Click END → return to home page
        </div>
    </div>
</div>

<script>
    let socket = null;
    let myGender = null;
    let myPreference = null;
    let isInChat = false;
    let isProcessingAction = false;

    const skipBtn = document.getElementById('skipBtn');
    const endBtn = document.getElementById('endBtn');
    const messagesList = document.getElementById('messages');
    const messageForm = document.getElementById('form');
    const messageInput = document.getElementById('input');
    const statusSpan = document.getElementById('status');
    const userCounterSpan = document.getElementById('userCounter');

    // Function to refresh the page (for skip and partner disconnect)
    function refreshPage() {
        console.log('Refreshing page...');
        // Store flag to prevent showing disconnect message after refresh
        localStorage.setItem('echoMatch_shouldRefresh', 'true');
        window.location.reload();
    }

    // Function to go to index.html (for End button)
    function goToHomePage() {
        console.log('Going to home page...');
        if (socket) {
            socket.disconnect();
        }
        localStorage.removeItem('echoMatch_gender');
        localStorage.removeItem('echoMatch_preference');
        window.location.href = 'index.html';
    }

    // Load user preferences from localStorage
    function loadUserPreferences() {
        myGender = localStorage.getItem('echoMatch_gender');
        myPreference = localStorage.getItem('echoMatch_preference');
        
        if (!myGender || !myPreference) {
            alert('Please select your preferences first');
            window.location.href = 'index.html';
            return false;
        }
        
        console.log(`Loaded preferences - Gender: ${myGender}, Preference: ${myPreference}`);
        return true;
    }

    function addMessage(text, type = 'system') {
        const li = document.createElement('li');
        li.classList.add('msg-bubble');
        if (type === 'you') {
            li.classList.add('msg-you');
            li.textContent = `You: ${text}`;
        } else if (type === 'stranger') {
            li.classList.add('msg-stranger');
            li.textContent = `Stranger: ${text}`;
        } else if (type === 'warning') {
            li.classList.add('msg-warning');
            li.textContent = text;
        } else if (type === 'error') {
            li.classList.add('msg-error');
            li.textContent = text;
        } else if (type === 'success') {
            li.classList.add('msg-success');
            li.textContent = text;
        } else {
            li.classList.add('msg-system');
            li.textContent = text;
        }
        messagesList.appendChild(li);
        li.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function clearMessages() {
        messagesList.innerHTML = '';
    }

    function setStatus(msg) {
        statusSpan.textContent = msg;
    }

    function updateUserCount(count) {
        userCounterSpan.textContent = `👥 ${count} online`;
    }

    function enableChatControls(enabled) {
        messageInput.disabled = !enabled;
        const sendBtnElem = document.querySelector('#form .send-btn');
        if (sendBtnElem) sendBtnElem.disabled = !enabled;
        if (enabled) messageInput.focus();
    }

    function fullDisconnectAndCleanup() {
        if (socket) {
            socket.removeAllListeners();
            socket.disconnect();
            socket = null;
        }
        isInChat = false;
    }

    // Initialize chat session
    function initChatSession() {
        fullDisconnectAndCleanup();
        
        socket = io({
            transports: ['websocket', 'polling'],
            reconnection: true
        });

        socket.on('connect', () => {
            console.log('Connected to server');
            socket.emit('user-meta', {
                gender: myGender,
                preference: myPreference
            });
            setStatus("🔄 Finding match...");
            enableChatControls(false);
            isInChat = false;
        });

        socket.on('waiting', () => {
            setStatus("⏳ Waiting for stranger...");
            addMessage("🔎 Looking for a compatible partner...", "system");
            isInChat = false;
            enableChatControls(false);
        });

        socket.on('connected', () => {
            setStatus("✨ Connected! Chat now");
            addMessage("🤝 Matched! You can now start chatting", "success");
            isInChat = true;
            enableChatControls(true);
            messageInput.focus();
        });

        socket.on('message', (msg) => {
            addMessage(msg, 'stranger');
        });

        // Partner clicked SKIP -> refresh the page to find new partner
        socket.on('partner skipped', () => {
            console.log('Partner skipped - refreshing page...');
            addMessage("⚠️ Your partner skipped to find someone else. Refreshing to find new partner...", "warning");
            setStatus("🔄 Partner skipped - refreshing...");
            
            setTimeout(() => {
                refreshPage();
            }, 1500);
        });

        // Partner clicked END -> refresh the page to find new partner
        socket.on('partner ended', () => {
            console.log('Partner ended chat - refreshing page...');
            addMessage("⚠️ Your partner ended the chat. Refreshing to find new partner...", "error");
            setStatus("🔄 Partner ended - refreshing...");
            
            setTimeout(() => {
                refreshPage();
            }, 1500);
        });

        // Partner disconnected -> refresh the page
        socket.on('partner disconnected', () => {
            console.log('Partner disconnected - refreshing page...');
            addMessage("⚠️ Your partner disconnected. Refreshing to find new partner...", "error");
            setStatus("🔄 Partner disconnected - refreshing...");
            
            setTimeout(() => {
                refreshPage();
            }, 1500);
        });

        // Our own skip success -> refresh the page
        socket.on('skip-success', () => {
            console.log('Skip successful - refreshing page...');
            setStatus("⏭ Skipped - finding new partner...");
            
            setTimeout(() => {
                refreshPage();
            }, 500);
        });

        // Our own end success -> go to home page
        socket.on('end-success', () => {
            console.log('End successful - going home...');
            setStatus("👋 Chat ended - returning home...");
            
            setTimeout(() => {
                goToHomePage();
            }, 500);
        });

        socket.on('user-count', (count) => {
            updateUserCount(count);
        });

        socket.on('disconnect', () => {
            setStatus("🔌 Disconnected from server");
            addMessage("Connection lost. Reconnecting...", "error");
            isInChat = false;
            enableChatControls(false);
        });

        socket.on('connect_error', (err) => {
            console.error("Connection error:", err);
            addMessage("⚠️ Server connection issue. Trying again...", "error");
        });
    }

    // Skip handler - emit skip-request, page will refresh on skip-success
    function handleSkip() {
        if (!socket || !socket.connected) {
            addMessage("⚠️ Not connected to server. Refreshing to reconnect...", "system");
            setTimeout(() => refreshPage(), 1000);
            return;
        }
        if (isProcessingAction) {
            addMessage("⏳ Already processing...", "system");
            return;
        }
        
        isProcessingAction = true;
        addMessage("⏭ Skipping current chat...", "system");
        setStatus("⏭ Skipping...");
        socket.emit('skip-request');
        
        // Fallback refresh after 2 seconds if no response
        setTimeout(() => {
            if (isProcessingAction) {
                console.log('Skip fallback - refreshing');
                refreshPage();
            }
        }, 2000);
    }

    // End handler - emit end-request, page will go to index on end-success
    function handleEnd() {
        if (!socket || !socket.connected) {
            addMessage("⚠️ Already disconnected. Returning home...", "system");
            setTimeout(() => goToHomePage(), 1000);
            return;
        }
        if (isProcessingAction) {
            addMessage("⏳ Already processing...", "system");
            return;
        }
        
        isProcessingAction = true;
        addMessage("✖ Ending current chat...", "system");
        setStatus("👋 Ending...");
        socket.emit('end-request');
        
        // Fallback go home after 2 seconds if no response
        setTimeout(() => {
            if (isProcessingAction) {
                console.log('End fallback - going home');
                goToHomePage();
            }
        }, 2000);
    }

    // Event listeners
    skipBtn.addEventListener('click', handleSkip);
    endBtn.addEventListener('click', handleEnd);

    messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!socket || !socket.connected) {
            addMessage("⚠️ Not connected to server.", "system");
            return;
        }
        if (!isInChat) {
            addMessage("⚠️ No active chat. Wait for a match or click Skip.", "system");
            return;
        }
        const msg = messageInput.value.trim();
        if (msg === "") return;
        
        addMessage(msg, 'you');
        socket.emit('message', msg);
        messageInput.value = "";
        messageInput.focus();
    });

    // Check if we're coming from a refresh
    const shouldRefreshFlag = localStorage.getItem('echoMatch_shouldRefresh');
    if (shouldRefreshFlag === 'true') {
        localStorage.removeItem('echoMatch_shouldRefresh');
        console.log('Page refreshed after partner action');
    }

    // Initialize
    if (loadUserPreferences()) {
        clearMessages();
        setStatus("⏳ Starting session...");
        updateUserCount(0);
        enableChatControls(false);
        initChatSession();
    }

    window.addEventListener('beforeunload', () => {
        if (socket) {
            socket.disconnect();
        }
    });
</script>

</body>
</html>
